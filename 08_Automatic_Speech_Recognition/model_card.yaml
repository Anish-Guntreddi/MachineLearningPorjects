project_id: 08
title: Automatic Speech Recognition
short_description: Speech-to-text on LibriSpeech
category: Audio
input_type: audio
output_type: transcribed_text
default_model: whisper_tiny
models_available:
- deepspeech2
- wav2vec2
- whisper_tiny
- whisper_base
technical_overview:
  summary: "This project transcribes English speech to text using LibriSpeech audiobook recordings with a CTC-based (Connectionist Temporal Classification) architecture. Audio is converted to log mel-spectrograms that encode frequency content over time, then processed by convolutional and recurrent layers to produce character-level predictions. CTC loss handles the alignment problem — it sums over all possible alignments between audio frames and text characters without requiring explicit frame-level annotation. Audio augmentation (Gaussian noise, time-stretching, pitch-shifting) improves robustness to recording conditions."
  pipeline:
    - "Audio loading: WAV files resampled to 16kHz, amplitude normalized"
    - "Text normalization: Lowercase, expand contractions, remove punctuation → 29-character alphabet (a-z, space, apostrophe, blank)"
    - "Feature extraction: Log mel-spectrogram (80 mel bins) or MFCC features computed per 25ms frame with 10ms hop"
    - "Audio augmentation: Gaussian noise injection, time-stretching (0.8-1.2x), pitch-shifting for robustness"
    - "Acoustic model: CNN feature extractor + bidirectional GRU/LSTM layers produce per-frame character probabilities"
    - "CTC decoding: CTC loss during training; greedy or beam search decoding at inference collapses repeated characters"
    - "Evaluation: Word Error Rate (WER) — percentage of incorrectly transcribed words (insertions + deletions + substitutions)"
dataset:
  name: LibriSpeech
  source: torchaudio
  num_classes: 29
  train_size: 28539
  test_size: 2620
tags:
- speech-recognition
- asr
- librispeech
demo_type: precomputed

architecture:
  type: "CNN-RNN / Transformer"
  key_components:
  - "DeepSpeech2 with Conv + bidirectional GRU/LSTM"
  - "Wav2Vec2 self-supervised pretrained encoder"
  - "Whisper encoder-decoder Transformer"
  - "CTC decoding for DeepSpeech2"
  - "Spectrogram feature extraction frontend"
  pretrained: true
  framework: "PyTorch"

training:
  loss_function: "CTCLoss (DeepSpeech2/Conformer) / CrossEntropyLoss (seq2seq models)"
  optimizer: "AdamW"
  scheduler: "OneCycleLR / ReduceLROnPlateau"
  augmentation:
  - "SpecAugment (time/frequency masking)"
  - "Speed perturbation"
  - "Background noise injection"
  mixed_precision: true
  gradient_clipping: true

methodology:
  summary: "Speech-to-text using DeepSpeech2 CTC-based and Whisper seq2seq architectures on LibriSpeech, with character-level tokenization and WER/CER evaluation."
  key_techniques:
  - "Optuna HPO"
  - "Early stopping"
  - "CTC decoding with blank token handling"
  - "Character-level tokenization"
  - "Word Error Rate (WER) and Character Error Rate (CER) evaluation"
  - "Mixed precision training"
