project_num: 1
project_name: "Image Classification"
project_dir: "01_Image_Classification"
domain: "vision"
description: "CIFAR-10/ImageNet classification with CNNs and Vision Transformers"
category: "Computer Vision"
input_type: "image"
output_type: "class_label"
demo_type: "interactive"

model:
  factory_import: "from models import get_model"
  factory_call: "get_model('simple_cnn', num_classes=10, pretrained=False)"
  default_model: "simple_cnn"
  models_available: [simple_cnn, resnet18, resnet50, efficientnet_b0, vit_tiny_patch16_224]

data:
  has_data_loader: true
  loader_import: "from data_loader import load_cifar10"
  loader_call: "train_loader, val_loader, test_loader = load_cifar10(batch_size=config['batch_size'], num_workers=platform_config['num_workers'], pin_memory=platform_config['pin_memory'])"
  dataset_name: "CIFAR-10"
  num_classes: 10
  class_names: [airplane, automobile, bird, cat, deer, dog, frog, horse, ship, truck]
  train_size: 45000
  test_size: 10000

training:
  has_train_py: true
  trainer_import: "from train import Trainer"
  trainer_class: "Trainer"
  epochs: 5
  batch_size: 64
  learning_rate: 0.001

evaluation:
  metrics: [accuracy, top5_accuracy, f1_macro]
  primary_metric: "accuracy"

tags: [cnn, cifar-10, image-classification]
